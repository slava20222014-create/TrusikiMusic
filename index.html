<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Trusiki Music</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #ededed;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #151515;
        }
        ::-webkit-scrollbar-thumb {
            background: #e31c25;
            border-radius: 12px;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Верхняя навигация */
        .top-bar {
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(14px);
            padding: 12px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(227, 28, 37, 0.4);
            z-index: 20;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.6rem;
            background: linear-gradient(130deg, #e31c25, #ff7a45);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo i {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #e31c25;
            font-size: 1.7rem;
        }

        .nav-group {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: #bbbbbb;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 8px 26px;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .nav-btn.active {
            background: #e31c25;
            color: white;
            box-shadow: 0 4px 12px rgba(227, 28, 37, 0.5);
        }

        .nav-btn:hover:not(.active) {
            background: #2a2a2a;
            color: white;
        }

        /* основной контент */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 26px 32px;
            background: radial-gradient(ellipse at 20% 30%, #111111, #000000);
        }

        .section-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 26px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 5px solid #e31c25;
            padding-left: 20px;
        }

        /* трек-лист */
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 48px;
        }

        .track-item {
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
        }

        .track-item:hover {
            background: #232323;
            transform: translateX(6px);
            border-color: rgba(227, 28, 37, 0.5);
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 3;
        }

        .track-cover-img {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            object-fit: cover;
            background: #1e1e1e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .track-position {
            font-weight: 800;
            font-size: 1.4rem;
            min-width: 55px;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .pos-1 {
            color: #e31c25;
            text-shadow: 0 0 6px #e31c25;
            font-size: 1.8rem;
        }

        .track-title {
            font-weight: 700;
            font-size: 1rem;
        }

        .artist-names {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .artist-chip {
            background: none;
            border: none;
            color: #bcbcbc;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            padding: 0;
            font-weight: 500;
        }

        .artist-chip:hover {
            color: #e31c25;
            text-decoration: underline;
        }

        .track-stats {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #e31c25;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* сетка артистов */
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 28px;
            margin-top: 16px;
        }

        .artist-card {
            background: #101010;
            border-radius: 28px;
            padding: 22px 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.25s ease;
            border: 1px solid #252525;
            display: flex;
            flex-direction: column;
            align-items: center;
            word-break: break-word;
        }

        .artist-card:hover {
            transform: translateY(-6px);
            background: #1c1c1c;
            border-color: #e31c25;
            box-shadow: 0 14px 28px rgba(227, 28, 37, 0.2);
        }

        .artist-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 14px;
            border: 2px solid #e31c25;
        }

        .artist-name {
            font-weight: 800;
            font-size: 1rem;
            margin-top: 6px;
            max-width: 100%;
            overflow-wrap: break-word;
            word-break: break-word;
            padding: 0 6px;
            line-height: 1.3;
        }

        .back-btn {
            background: rgba(227, 28, 37, 0.2);
            border: 1px solid #e31c25;
            color: white;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 28px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: #e31c25;
            box-shadow: 0 2px 12px rgba(227,28,37,0.6);
        }

        .artist-profile-header {
            display: flex;
            align-items: center;
            gap: 36px;
            background: linear-gradient(125deg, #141414, #050505);
            padding: 28px 32px;
            border-radius: 32px;
            margin-bottom: 32px;
            border: 1px solid rgba(227, 28, 37, 0.4);
            flex-wrap: wrap;
        }

        .profile-avatar-lg {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #e31c25;
        }

        .release-tabs {
            display: flex;
            gap: 24px;
            margin-bottom: 28px;
            border-bottom: 1px solid #2c2c2c;
            flex-wrap: wrap;
        }

        .release-tab {
            background: none;
            border: none;
            color: #bcbcbc;
            font-weight: 700;
            padding: 10px 0;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .release-tab.active {
            color: #e31c25;
            border-bottom: 2px solid #e31c25;
        }

        .clips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            margin-top: 16px;
        }

        .clip-card {
            background: #111;
            border-radius: 24px;
            padding: 18px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            border: 1px solid #2a2a2a;
        }

        .clip-card:hover {
            background: #202020;
            border-color: #e31c25;
            transform: scale(1.02);
        }

        .clip-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: #1e1e1e;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #e31c25;
        }

        /* плеер внизу */
        .player-bar {
            background: #030303;
            border-top: 1px solid #e31c25;
            padding: 12px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
            z-index: 15;
        }

        .player-track {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 200px;
        }

        .player-cover {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            background: #1f1f1f;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .player-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-controls {
            display: flex;
            gap: 20px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.7rem;
            cursor: pointer;
            transition: 0.1s;
        }

        .ctrl-btn:hover {
            color: #e31c25;
            transform: scale(1.05);
        }

        .play-pause-main {
            background: #e31c25;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .progress-section {
            flex: 2;
            min-width: 180px;
        }

        .progress-bar-bg {
            background: #2c2c2c;
            height: 5px;
            border-radius: 10px;
            cursor: pointer;
        }

        .progress-fill {
            background: #e31c25;
            width: 0%;
            height: 100%;
            border-radius: 10px;
        }

        .time-stamps {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 0.7rem;
            color: #aaa;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.96);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(12px);
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 1000px;
            background: #000;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 0 32px rgba(227, 28, 37, 0.6);
        }

        .modal-content video {
            width: 100%;
            display: block;
        }

        .close-modal {
            position: absolute;
            top: 16px;
            right: 20px;
            background: #e31c25;
            color: white;
            border: none;
            font-size: 28px;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 20;
        }

        .toast-msg {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: #e31c25;
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.85rem;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
            white-space: nowrap;
        }

        @media (max-width: 700px) {
            .main-content { padding: 18px; }
            .top-bar { flex-direction: column; align-items: stretch; padding: 10px 18px; }
            .nav-group { justify-content: center; }
            .artist-profile-header { flex-direction: column; text-align: center; }
            .player-bar { padding: 12px 16px; gap: 12px; }
            .track-position { min-width: 40px; font-size: 1.1rem; }
            .artists-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .artist-name { font-size: 0.85rem; }
        }
    </style>
</head>

    // localStorage plays
    let playsMap = new Map();
    function loadPlays() {
        const saved = localStorage.getItem('trusiki_plays');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                playsMap = new Map(Object.entries(parsed).map(([k, v]) => [parseInt(k), v]));
            } catch(e) {}
        }
        tracksData.forEach(track => { if (!playsMap.has(track.id)) playsMap.set(track.id, 0); });
        savePlays();
    }
    function savePlays() {
        const obj = {};
        playsMap.forEach((v, k) => obj[k] = v);
        localStorage.setItem('trusiki_plays', JSON.stringify(obj));
    }
    function incrementPlays(trackId) {
        playsMap.set(trackId, (playsMap.get(trackId) || 0) + 1);
        savePlays();
        const toast = document.getElementById('toastMsg');
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 1200);
        if (document.querySelector('.nav-btn.active')?.innerText.includes('Чарты')) renderCharts();
    }
    function getTrackWithPlays(track) { return { ...track, plays: playsMap.get(track.id) || 0 }; }
    function getAllTracksWithPlays() { return tracksData.map(t => getTrackWithPlays(t)); }
    function getAllArtists() {
        const set = new Set();
        tracksData.forEach(t => t.artist.split(',').map(a => a.trim()).forEach(a => set.add(a)));
        return Array.from(set);
    }
    function getTracksByArtist(artistName) {
        return tracksData.filter(t => t.artist.split(',').map(a => a.trim()).includes(artistName)).map(t => getTrackWithPlays(t));
    }

    // Плеер с обложкой
    let isPlaying = false;
    let currentTrackId = 1;
    const audio = document.getElementById('audioPlayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playerCoverIcon = document.getElementById('playerCoverIcon');
    
    function updatePlayerCover(trackTitle) {
        const coverUrl = trackCovers[trackTitle];
        if (coverUrl) {
            playerCoverIcon.innerHTML = `<img src="${coverUrl}" alt="cover">`;
        } else {
            playerCoverIcon.innerHTML = `<i class="fas fa-headphones" style="font-size: 28px; color:#e31c25;"></i>`;
        }
    }
    
    function playTrackById(trackId) {
        const track = tracksData.find(t => t.id == trackId);
        if (!track) return;
        currentTrackId = track.id;
        audio.src = track.src;
        document.getElementById('playerTitle').innerText = track.title;
        document.getElementById('playerArtist').innerText = track.artist.split(',')[0].trim();
        updatePlayerCover(track.title);
        audio.play().catch(e => console.log);
        isPlaying = true;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        incrementPlays(track.id);
    }
    
    function togglePlayPause() {
        if (!audio.src) { playTrackById(1); return; }
        if (isPlaying) { audio.pause(); playPauseBtn.innerHTML = '<i class="fas fa-play"></i>'; }
        else { audio.play(); playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
        isPlaying = !isPlaying;
    }
    function nextTrack() { let n = currentTrackId + 1; if (n > tracksData.length) n = 1; playTrackById(n); }
    function prevTrack() { let p = currentTrackId - 1; if (p < 1) p = tracksData.length; playTrackById(p); }

    // Modal logic
    const modal = document.getElementById('videoModal');
    const modalVideo = document.getElementById('modalVideo');
    function openClip(url) {
        if (!url) return;
        modalVideo.src = url;
        modal.style.display = 'flex';
        modalVideo.play().catch(e => console.log);
    }
    function closeModal() {
        modalVideo.pause();
        modalVideo.src = '';
        modal.style.display = 'none';
    }
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    window.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    // Рендеры
    function renderCharts() {
        const sorted = getAllTracksWithPlays().sort((a,b) => b.plays - a.plays);
        let html = `<div class="section-title"><i class="fas fa-fire"></i> Реальный Топ</div><div class="track-list">`;
        sorted.forEach((track, idx) => {
            const pos = idx+1;
            const cover = trackCovers[track.title] || "https://cdn.discordapp.com/attachments/1291442583033348119/1509854044322140231/image_large_cc30e771-2330-4418-bf81-27169fcd384e.png?ex=6a1ab0a7&is=6a195f27&hm=c59c0916277cb83fb5aff12741971134a2d9bb5e90b00068f9a955f01202ae4b&";
            const artistsHtml = `<div class="artist-names">${track.artist.split(',').map(a => `<button class="artist-chip" data-artist="${a.trim()}">${a.trim()}</button>`).join(', ')}</div>`;
            const medal = pos === 1 ? '<i class="fas fa-crown"></i> ' : (pos === 2 ? '<i class="fas fa-medal"></i> ' : (pos === 3 ? '<i class="fas fa-star"></i> ' : ''));
            html += `<div class="track-item" data-track-id="${track.id}"><div class="track-info"><img class="track-cover-img" src="${cover}"><span class="track-position ${pos===1?'pos-1':''}">${medal}${pos}</span><div><div class="track-title">${track.title}</div>${artistsHtml}</div></div><div class="track-stats"><i class="fas fa-headphones"></i> ${track.plays}</div></div>`;
        });
        html += `</div>`;
        document.getElementById('mainContent').innerHTML = html;
        attachEvents();
    }

    function renderArtists() {
        const artists = getAllArtists();
        let html = `<div class="section-title"><i class="fas fa-users"></i> Все артисты</div><div class="artists-grid">`;
        artists.forEach(artist => {
            const avatar = artistAvatars[artist] || "https://cdn.discordapp.com/attachments/1291442583033348119/1509854044322140231/image_large_cc30e771-2330-4418-bf81-27169fcd384e.png?ex=6a1ab0a7&is=6a195f27&hm=c59c0916277cb83fb5aff12741971134a2d9bb5e90b00068f9a955f01202ae4b&";
            html += `<div class="artist-card" data-artist="${artist}">
                        <img class="artist-avatar" src="${avatar}">
                        <div class="artist-name">${artist}</div>
                    </div>`;
        });
        html += `</div>`;
        document.getElementById('mainContent').innerHTML = html;
        document.querySelectorAll('.artist-card').forEach(card => {
            card.addEventListener('click', () => showArtistProfile(card.dataset.artist));
        });
    }

    function showArtistProfile(artistName) {
        const artistTracks = getTracksByArtist(artistName);
        const singles = artistTracks.filter(t => !t.album);
        const albums = [...new Set(artistTracks.filter(t => t.album).map(t => t.album))];
        const hasClips = !!artistClips[artistName];
        
        let html = `<button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Назад</button>
                    <div class="artist-profile-header">
                        <img class="profile-avatar-lg" src="${artistAvatars[artistName] || "https://cdn.discordapp.com/attachments/1291442583033348119/1509854044322140231/image_large_cc30e771-2330-4418-bf81-27169fcd384e.png?ex=6a1ab0a7&is=6a195f27&hm=c59c0916277cb83fb5aff12741971134a2d9bb5e90b00068f9a955f01202ae4b&"}">
                        <div><h1 style="font-size:34px">${artistName}</h1><p>${artistTracks.length} треков</p></div>
                    </div>
                    <div class="release-tabs">
                        <button class="release-tab active" data-type="singles">Релизы</button>
                        ${albums.length ? `<button class="release-tab" data-type="albums">Альбомы</button>` : ''}
                        ${hasClips ? `<button class="release-tab" data-type="clips">Клипы</button>` : ''}
                    </div>
                    <div id="releaseContainer"></div>`;
        document.getElementById('mainContent').innerHTML = html;
        
        function showSingles() {
            let list = `<div class="track-list">`;
            singles.forEach(t => {
                const cover = trackCovers[t.title] || "https://cdn.discordapp.com/attachments/1291442583033348119/1509854044322140231/image_large_cc30e771-2330-4418-bf81-27169fcd384e.png?ex=6a1ab0a7&is=6a195f27&hm=c59c0916277cb83fb5aff12741971134a2d9bb5e90b00068f9a955f01202ae4b&";
                list += `<div class="track-item" data-track-id="${t.id}"><div class="track-info"><img class="track-cover-img" src="${cover}"><div><div class="track-title">${t.title}</div></div></div><div class="track-stats"><i class="fas fa-play-circle"></i> ${t.plays}</div></div>`;
            });
            list += `</div>`;
            document.getElementById('releaseContainer').innerHTML = list;
            attachEvents();
        }
        
        function showAlbums() {
            let albumHtml = `<div class="artists-grid">`;
            albums.forEach(alb => {
                albumHtml += `<div class="artist-card" data-album="${alb}"><img class="track-cover-img" src="https://cdn.discordapp.com/attachments/1291442583033348119/1509854044322140231/image_large_cc30e771-2330-4418-bf81-27169fcd384e.png?ex=6a1ab0a7&is=6a195f27&hm=c59c0916277cb83fb5aff12741971134a2d9bb5e90b00068f9a955f01202ae4b&" style="width:100px;height:100px;margin:0 auto 12px;border-radius:20px;"><div class="artist-name">${alb}</div></div>`;
            });
            albumHtml += `</div>`;
            document.getElementById('releaseContainer').innerHTML = albumHtml;
            document.querySelectorAll('[data-album]').forEach(el => {
                el.addEventListener('click', () => {
                    const albumName = el.dataset.album;
                    const albumTracks = tracksData.filter(t => t.album === albumName).map(t => getTrackWithPlays(t));
                    let tracksHtml = `<div class="track-list">`;
                    albumTracks.forEach(tr => {
                        const cover = trackCovers[tr.title] || "https://cdn.discordapp.com/attachments/1291442583033348119/1509854044322140231/image_large_cc30e771-2330-4418-bf81-27169fcd384e.png?ex=6a1ab0a7&is=6a195f27&hm=c59c0916277cb83fb5aff12741971134a2d9bb5e90b00068f9a955f01202ae4b&";
                        tracksHtml += `<div class="track-item" data-track-id="${tr.id}"><div class="track-info"><img class="track-cover-img" src="${cover}"><div><div class="track-title">${tr.title}</div><div class="artist-names">${tr.artist.split(',').map(a => `<span class="artist-chip" data-artist="${a.trim()}">${a.trim()}</span>`).join(', ')}</div></div></div></div>`;
                    });
                    tracksHtml += `</div><button class="back-btn" id="backToProfile" style="margin-top:20px"><i class="fas fa-arrow-left"></i> К артисту</button>`;
                    document.getElementById('releaseContainer').innerHTML = tracksHtml;
                    attachEvents();
                    document.getElementById('backToProfile')?.addEventListener('click', () => showArtistProfile(artistName));
                });
            });
        }
        
        function showClips() {
            const clip = artistClips[artistName];
            if (!clip) return;
            let clipsHtml = `<div class="clips-grid">
                <div class="clip-card" data-url="${clip.url}">
                    <div class="clip-thumb"><i class="fas fa-video"></i></div>
                    <div class="clip-title">${clip.title}</div>
                </div>
            </div>`;
            document.getElementById('releaseContainer').innerHTML = clipsHtml;
            document.querySelectorAll('.clip-card').forEach(card => {
                card.addEventListener('click', () => openClip(card.dataset.url));
            });
        }
        
        showSingles();
        document.querySelectorAll('.release-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.release-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if (tab.dataset.type === 'singles') showSingles();
                else if (tab.dataset.type === 'albums') showAlbums();
                else if (tab.dataset.type === 'clips') showClips();
            });
        });
        document.getElementById('backBtn')?.addEventListener('click', renderArtists);
        attachEvents();
    }

    function attachEvents() {
        document.querySelectorAll('.track-item').forEach(el => {
            el.addEventListener('click', (e) => { e.stopPropagation(); const id = el.dataset.trackId; if (id) playTrackById(parseInt(id)); });
        });
        document.querySelectorAll('.artist-chip').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); const artist = btn.dataset.artist; if (artist) showArtistProfile(artist); });
        });
    }

    // Навигация
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (btn.dataset.page === 'charts') renderCharts();
            if (btn.dataset.page === 'artists') renderArtists();
        });
    });

    audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
            const percent = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressFill').style.width = `${percent}%`;
            let curMin = Math.floor(audio.currentTime / 60);
            let curSec = Math.floor(audio.currentTime % 60);
            document.getElementById('currentTime').innerText = `${curMin}:${curSec < 10 ? '0'+curSec : curSec}`;
            let durMin = Math.floor(audio.duration / 60);
            let durSec = Math.floor(audio.duration % 60);
            document.getElementById('durationTime').innerText = `${durMin}:${durSec < 10 ? '0'+durSec : durSec}`;
        }
    });
    document.getElementById('progressBarBg').addEventListener('click', (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        if (audio.duration) audio.currentTime = percent * audio.duration;
    });
    playPauseBtn.addEventListener('click', togglePlayPause);
    document.getElementById('prevBtn').addEventListener('click', prevTrack);
    document.getElementById('nextBtn').addEventListener('click', nextTrack);
    audio.addEventListener('ended', nextTrack);

    loadPlays();
    renderCharts();
</script>
</body>
</html>
